name: データ収集

on:
  schedule:
    # 毎日 JST 7:00（UTC 22:00）に実行
    - cron: "0 22 * * *"
  workflow_dispatch:
    # GitHub UI から手動実行も可能

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write  # CSVをcommitするために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4.2.2

      - name: Python セットアップ
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: データ収集を実行
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
        run: python run_all.py

      - name: 差分を確認
        id: diff
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 更新されたCSVをcommit・push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: データ更新 $(date +'%Y-%m-%d')"
          git push

      - name: Vercel 再デプロイ（最新CSVを反映）
        if: steps.diff.outputs.changed == 'true'
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_API }}"
